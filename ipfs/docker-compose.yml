# Demos Network IPFS Integration
# Kubo (Go-IPFS) node for decentralized storage
#
# Started automatically by ./run script (like PostgreSQL)
# Uses port-based instance isolation: ipfs_${PORT}
#
# REVIEW: Phase 9 - Host networking for direct LAN address announcement

services:
    ipfs:
        image: ipfs/kubo:v0.26.0
        container_name: ipfs_${PORT:-53550}
        # REVIEW: Phase 9 - Host networking allows IPFS to see real network interfaces
        # This enables announcement of LAN addresses (192.168.x.x) for local peer discovery
        network_mode: host
        environment:
            # Server profile: optimized for always-on operation
            - IPFS_PROFILE=server
            # Disable public gateway (we proxy through Demos RPC)
            - IPFS_GATEWAY_WRITABLE=false
            # REVIEW: Phase 10 - Force private network mode (requires swarm.key)
            - LIBP2P_FORCE_PNET=1
            # REVIEW: Phase 9 - Pass API port for host networking configuration
            - IPFS_API_PORT=${IPFS_API_PORT:-54550}
            # REVIEW: Gateway port (default 58080 to avoid conflict with port 8080)
            - IPFS_GATEWAY_PORT=${IPFS_GATEWAY_PORT:-58080}
        volumes:
            # Persistent storage for IPFS data (port-based isolation like postgres)
            - ./data_${PORT:-53550}/ipfs:/data/ipfs
            # REVIEW: Phase 9 - Mount init script for port configuration
            # Note: swarm.key is written by init-ipfs.sh (Phase 10)
            - ./init-ipfs.sh:/container-init.d/init-ipfs.sh:ro
        # REVIEW: Phase 9 - Use custom entrypoint to configure fixed port 4001
        entrypoint: ["/bin/sh", "/container-init.d/init-ipfs.sh"]
        # Note: ports section removed - host networking exposes ports directly
        # Swarm: 4001 (TCP/UDP), API: IPFS_API_PORT (default 54550)
        healthcheck:
            test: ["CMD-SHELL", "ipfs id || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        restart: unless-stopped
        # Resource limits (adjust based on node requirements)
        deploy:
            resources:
                limits:
                    memory: 2G
                reservations:
                    memory: 512M
