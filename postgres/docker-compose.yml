services:
    env_file: ../.env
    db:
        container_name: postgres_${PG_PORT:-5332}
        image: postgres
        environment:
            POSTGRES_USER: demosuser
            POSTGRES_PASSWORD: demospassword
            PGDATA: /data/postgres
            POSTGRES_DB: demos
        volumes:
            - ./data_${PG_PORT:-5332}/postgres:/data/postgres
        ports:
            - "${PG_PORT:-5332}:5432"
        networks:
            - db
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -d postgres"]
            interval: 30s
            timeout: 10s
            retries: 5
networks:
    db:
        driver: bridge

volumes:
    db:
