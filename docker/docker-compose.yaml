version: "3.7"
services:
    kyntainer-1:
        image: kyntainer
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./node_base:/node
            - ./node_1/.demos_identity:/node/.demos_identity
            - ./node_1/data/chain.db:/node/data/chain.db
            - ./resources/peerlist:/node/demos_peers
        ports:
            # trunk-ignore(yamllint/quoted-strings)
            - "53551:53550"
        command: yarn run start:up
    kyntainer-2:
        image: kyntainer
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ./node_base:/node
            - ./node_2/.demos_identity:/node/.demos_identity
            - ./node_2/data/chain.db:/node/data/chain.db
            - ./resources/peerlist:/node/demos_peers
        ports:
            # trunk-ignore(yamllint/quoted-strings)
            - "53552:53550"
        command: yarn run start:up