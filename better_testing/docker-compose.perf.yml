services:
  loadgen:
    image: demos-devnet-node
    entrypoint: ["bun"]
    user: "${LOADGEN_UID:-1000}:${LOADGEN_GID:-1000}"
    depends_on:
      - node-1
      - node-2
      - node-3
      - node-4
    environment:
      # Comma-separated list of node RPC base URLs (inside the docker network).
      - TARGETS=${TARGETS:-http://node-1:53551,http://node-2:53552,http://node-3:53553,http://node-4:53554}
      # Scenario: rpc | transfer
      - SCENARIO=${SCENARIO:-rpc}
      - DURATION_SEC=${DURATION_SEC:-30}
      - CONCURRENCY=${CONCURRENCY:-50}
      - RPC_METHOD=${RPC_METHOD:-ping}
      - RPC_PATH=${RPC_PATH:-/}
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-0}
      - SAMPLE_LIMIT=${SAMPLE_LIMIT:-200000}
      - WAIT_FOR_RPC_SEC=${WAIT_FOR_RPC_SEC:-120}
      - WAIT_FOR_TX_SEC=${WAIT_FOR_TX_SEC:-120}
      - FETCH_TIMEOUT_MS=${FETCH_TIMEOUT_MS:-}
      - QUIET=${QUIET:-true}
      - AVOID_SELF_RECIPIENT=${AVOID_SELF_RECIPIENT:-true}
      - INFLIGHT_PER_WALLET=${INFLIGHT_PER_WALLET:-1}
      - EMIT_TIMESERIES=${EMIT_TIMESERIES:-true}
      - RUNS_DIR=${RUNS_DIR:-/runs}
      - RUN_ID=${RUN_ID:-}
      # Ramp scenario config
      - RAMP_CONCURRENCY=${RAMP_CONCURRENCY:-1,2,4,8}
      - RAMP_INFLIGHT_PER_WALLET=${RAMP_INFLIGHT_PER_WALLET:-}
      - STEP_DURATION_SEC=${STEP_DURATION_SEC:-15}
      - COOLDOWN_SEC=${COOLDOWN_SEC:-3}
      # Transfer scenario config (native send)
      # RECIPIENTS is required when SCENARIO=transfer
      - RECIPIENTS=${RECIPIENTS:-0x8db33f19486774dea73efbfed1175fb25fcf5a2682e1f55271207dc01670bb19,0x7bee59666b7ef18f648df18c4ed3677a79b30aaa6cf66dc6ab2818fd4be2dcfb,0xd98eabad3b7e6384355d313130314263278d5a7a7f5ab665881c54711159e760,0x71b0c2af6fed129df6c25dbf2b7a0d3c6b414df64980f513997be86200ef5e0e}
      - AMOUNT=${AMOUNT:-1}
      - MNEMONICS_DIR=${MNEMONICS_DIR:-/wallets}
      - WALLET_FILES=${WALLET_FILES:-node1.identity,node2.identity,node3.identity,node4.identity}
      # Token scenario config
      - TOKEN_ADDRESS=${TOKEN_ADDRESS:-}
      - TOKEN_BOOTSTRAP=${TOKEN_BOOTSTRAP:-true}
      - TOKEN_DISTRIBUTE=${TOKEN_DISTRIBUTE:-true}
      - TOKEN_NAME=${TOKEN_NAME:-Perf Token}
      - TOKEN_TICKER=${TOKEN_TICKER:-PERF}
      - TOKEN_DECIMALS=${TOKEN_DECIMALS:-18}
      - TOKEN_INITIAL_SUPPLY=${TOKEN_INITIAL_SUPPLY:-1000000000000000000000000}
      - TOKEN_DISTRIBUTE_AMOUNT=${TOKEN_DISTRIBUTE_AMOUNT:-100000000000000000000000}
      - TOKEN_TRANSFER_AMOUNT=${TOKEN_TRANSFER_AMOUNT:-1}
      - TOKEN_MINT_AMOUNT=${TOKEN_MINT_AMOUNT:-1}
      - TOKEN_BURN_AMOUNT=${TOKEN_BURN_AMOUNT:-1}
      - TOKEN_WAIT_EXISTS_SEC=${TOKEN_WAIT_EXISTS_SEC:-120}
      - TOKEN_WAIT_DISTRIBUTION_SEC=${TOKEN_WAIT_DISTRIBUTION_SEC:-120}
      - TOKEN_WAIT_DISTRIBUTION=${TOKEN_WAIT_DISTRIBUTION:-true}
    networks:
      - demos-network
    volumes:
      # Mount devnet mnemonics so loadgen can reuse funded devnet accounts without baking secrets into images.
      # Path is relative to the `devnet/` directory (where we run docker compose from).
      - ./identities:/wallets:ro
      # Keep containerized loadgen aligned with the locally patched SDK build until the fix is published.
      - ../node_modules/@kynesyslabs/demosdk:/app/node_modules/@kynesyslabs/demosdk:ro
      # Persist run outputs on the host for dashboarding and comparisons.
      - ../better_testing/runs:/runs
    command:
      [
        "better_testing/loadgen/src/main.ts"
      ]

networks:
  demos-network:
    external: false
