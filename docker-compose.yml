# =============================================================================
# Demos Network Node — Unified Docker Compose
# =============================================================================
# One-command bring-up:
#   cp .env.example .env
#   docker compose up
#
# Profiles (every optional service is gated; .env.example sets COMPOSE_PROFILES
# = monitoring,tlsnotary by default so a plain `docker compose up` brings up
# the recommended full stack):
#
#   No profile             postgres + node               -> minimum stack
#   tlsnotary              + tlsnotary sidecar           -> notarization
#                            (pair with TLSNOTARY_ENABLED in .env)
#   monitoring             + prometheus + grafana        -> dashboards
#   full                   + node-exporter               -> host metrics
#   neo4j                  + neo4j                       -> CGC/KYC only
#
# Persistent state lives in named volumes (prefixed `demos_`):
#   demos_pgdata, demos_node_data, demos_node_logs, demos_node_state,
#   demos_prometheus_data, demos_grafana_data, demos_neo4j_data,
#   demos_neo4j_logs
#
# Multi-instance: every fixed name (containers, network, volumes) carries an
# `${INSTANCE_SUFFIX:-}` interpolation. Unset (the default) it expands to ""
# and yields the exact names documented above. `./run --docker --port <p>`
# exports INSTANCE_SUFFIX=_<p> plus a distinct compose project name so a
# second stack runs fully isolated on the same host (demos-node_53560,
# demos_pgdata_53560, demos-network_53560, ...).
#
# Wipe everything (DANGER): docker compose down -v
# =============================================================================

# Bounded json-file logging — without these caps a long-running deployment
# will eventually fill the docker storage volume. Anchor referenced from
# every service via `<<: *default-logging` (Epic 13 T12).
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — primary datastore for the node (TypeORM with synchronize=true)
  # Internal-only by default. Uncomment the ports stanza below to expose to host.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: demos-postgres${INSTANCE_SUFFIX:-}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-demosuser}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-demospassword}
      POSTGRES_DB: ${PG_DATABASE:-demos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-demosuser} -d ${PG_DATABASE:-demos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - demos-network
    # Host publishing is opt-in via docker-compose.db-port.yml (added by
    # `./run --docker --db <port>`), which maps ${PG_HOST_PORT}:5432.
    # ports:
    #   - "${PG_HOST_PORT:-5332}:5432"   # uncomment to access DB from host

  # ---------------------------------------------------------------------------
  # TLSNotary — provides cryptographic attestation of HTTPS responses.
  # Healthcheck uses localhost INSIDE the container (correct — it's its own loopback).
  # ---------------------------------------------------------------------------
  tlsnotary:
    image: ghcr.io/tlsnotary/tlsn/notary-server:v0.1.0-alpha.12
    container_name: demos-tlsnotary${INSTANCE_SUFFIX:-}
    restart: unless-stopped
    platform: linux/amd64
    # Profile-gated so COMPOSE_PROFILES=...,tlsnotary actually controls the
    # sidecar. Drop 'tlsnotary' from COMPOSE_PROFILES to skip it; pair that
    # with TLSNOTARY_ENABLED=false in .env so the node doesn't try to call it.
    profiles: [tlsnotary]
    environment:
      NS_NOTARIZATION__MAX_SENT_DATA: ${TLSNOTARY_MAX_SENT_DATA:-32768}
      # NS_PORT makes the notary LISTEN on ${TLSNOTARY_PORT} inside the
      # container, so the host mapping below is 1:1 (same port inside and
      # out). Required for multi-instance mode: the node reports its
      # TLSNOTARY_PORT on the tlsn endpoints, and clients dial that port on
      # the host — a container-internal 7047 behind a remapped host port
      # would make the node advertise a port nothing listens on.
      NS_PORT: ${TLSNOTARY_PORT:-7047}
    ports:
      - "${TLSNOTARY_PORT:-7047}:${TLSNOTARY_PORT:-7047}"
    # The upstream image has no curl/wget so its packaged HTTP healthcheck
    # always fails. Use bash's /dev/tcp pseudo-device to verify the notary
    # is listening — bash IS in the image, the default sh (dash) is not enough.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/${TLSNOTARY_PORT:-7047}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - demos-network

  # ---------------------------------------------------------------------------
  # Demos node itself.
  # Reads env from .env. PG_HOST=postgres and TLSNOTARY_HOST=tlsnotary are the
  # in-network service names — DO NOT override to localhost when using compose.
  # ---------------------------------------------------------------------------
  node:
    # IMAGE_NAME / IMAGE_TAG let you pull a pre-built image from a registry
    # instead of building locally. See README → "Publishing the image" for
    # the push/pull workflow. Defaults to a local build tagged demos-node:local.
    image: ${IMAGE_NAME:-demos-node}:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      # Build-time provenance. Compose interpolates these from the
      # host's git + shell at `docker compose build` time. The wrapper
      # script `./scripts/docker-run` (and CI) export them; manual
      # invocations also work because every variable has a sensible
      # `:-` default so an unset host falls back gracefully.
      args:
        GIT_COMMIT: ${GIT_COMMIT:-}
        GIT_BRANCH: ${GIT_BRANCH:-}
        GIT_DIRTY: ${GIT_DIRTY:-false}
        BUILT_AT: ${BUILT_AT:-}
    container_name: demos-node${INSTANCE_SUFFIX:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      # tlsnotary is profile-gated; if its profile is off, Compose drops
      # this dependency silently and the node starts without it. Make sure
      # to also set TLSNOTARY_ENABLED=false in .env in that case.
      tlsnotary:
        condition: service_started
        required: false
    environment:
      # Network & ports
      RPC_PORT: ${RPC_PORT:-53550}
      EXPOSED_URL: ${EXPOSED_URL:-http://localhost:53550}
      OMNI_ENABLED: ${OMNI_ENABLED:-true}
      OMNI_PORT: ${OMNI_PORT:-53551}
      OMNI_MODE: ${OMNI_MODE:-OMNI_PREFERRED}
      RPC_SIGNALING_PORT: ${RPC_SIGNALING_PORT:-3005}
      RPC_MCP_PORT: ${RPC_MCP_PORT:-3001}
      # Database — service name from this compose
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-demosuser}
      PG_PASSWORD: ${PG_PASSWORD:-demospassword}
      PG_DATABASE: ${PG_DATABASE:-demos}
      # Identity & peers — entrypoint symlinks these into /app/state on boot
      IDENTITY_FILE: ${IDENTITY_FILE:-.demos_identity}
      PEER_LIST_FILE: ${PEER_LIST_FILE:-demos_peerlist.json}
      # Monitoring
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      # METRICS_PORT is pinned to 9090 inside the container so the
      # prometheus.yml scrape target (node:9090) stays valid. Use
      # METRICS_HOST_PORT in the ports stanza to remap on the host.
      METRICS_PORT: 9090
      METRICS_HOST: ${METRICS_HOST:-0.0.0.0}
      # TLSNotary — service name from this compose. The port matches the
      # notary's NS_PORT (and its 1:1 host mapping), so the value the node
      # advertises on the tlsn endpoints is dialable from outside.
      TLSNOTARY_ENABLED: ${TLSNOTARY_ENABLED:-true}
      TLSNOTARY_HOST: tlsnotary
      TLSNOTARY_PORT: ${TLSNOTARY_PORT:-7047}
      TLSNOTARY_MODE: ${TLSNOTARY_MODE:-docker}
      TLSNOTARY_FATAL: ${TLSNOTARY_FATAL:-false}
      TLSNOTARY_SIGNING_KEY: ${TLSNOTARY_SIGNING_KEY:-}
      # wstcp proxy port window. The node spawns dynamic wstcp proxies in
      # this range and the host reverse proxy forwards /tlsn/<port>/ to them,
      # so the SAME range must be host-published in `ports:` below — kept
      # narrow to avoid a 2000-port mapping. Both stanzas read these vars so
      # the allocation range and the published range can never drift.
      TLSNOTARY_PROXY_PORT_MIN: ${TLSNOTARY_PROXY_PORT_MIN:-55000}
      TLSNOTARY_PROXY_PORT_MAX: ${TLSNOTARY_PROXY_PORT_MAX:-55063}
      # Logging & misc
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PROD: ${PROD:-false}
      L2PS_ZK_ENABLED: ${L2PS_ZK_ENABLED:-false}
      # Optional external API keys (passed through if set in .env)
      SOLANA_RPC: ${SOLANA_RPC:-}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY:-}
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      NOMIS_API_KEY: ${NOMIS_API_KEY:-}
      NOMIS_CLIENT_ID: ${NOMIS_CLIENT_ID:-}
      RAPID_API_KEY: ${RAPID_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      HUMAN_PASSPORT_API_KEY: ${HUMAN_PASSPORT_API_KEY:-}
    volumes:
      - node_data:/app/data       # bundled bootstrap (genesis.json, evmChains, l2ps) + chain.db
      - node_logs:/app/logs       # all node logs
      - node_state:/app/state     # identity, peerlist, tlsnotary key, output/
    ports:
      # Both sides of each mapping must use the same variable, otherwise
      # overriding RPC_PORT (etc.) routes the host port to a container
      # port where nothing is listening.
      - "${RPC_PORT:-53550}:${RPC_PORT:-53550}"
      - "${OMNI_PORT:-53551}:${OMNI_PORT:-53551}"
      - "${RPC_SIGNALING_PORT:-3005}:${RPC_SIGNALING_PORT:-3005}"
      # wstcp TLSNotary proxy range, bound to 127.0.0.1 so ONLY the host's
      # reverse proxy can reach it (not the public internet). The node
      # allocates dynamic proxy ports here and nginx forwards
      # /tlsn/<port>/ to them — without this mapping every verification
      # 502s. MUST match TLSNOTARY_PROXY_PORT_MIN/MAX in `environment:`.
      - "127.0.0.1:${TLSNOTARY_PROXY_PORT_MIN:-55000}-${TLSNOTARY_PROXY_PORT_MAX:-55063}:${TLSNOTARY_PROXY_PORT_MIN:-55000}-${TLSNOTARY_PROXY_PORT_MAX:-55063}"
      # MCP (Model Context Protocol) intentionally NOT host-published.
      # The server binds `localhost` inside the container (src/index.ts)
      # and the SDK has no built-in authentication — publishing this port
      # exposes node identity + peer topology to anyone who can reach it.
      # See docs/runbooks/mcp-security.md +
      # docs/discoveries/startup-assessment-2026-05-13/08-epic-3-blockers.md.
      # When Epic 12 introduces a reverse proxy with bearer auth, MCP can
      # be re-exposed there. Until then it remains reachable only via
      # `docker compose exec node curl http://localhost:3001/sse`.
      # - "${RPC_MCP_PORT:-3001}:${RPC_MCP_PORT:-3001}"
      # METRICS_PORT — keep container port pinned to 9090 so the
      # prometheus.yml scrape target (node:9090) stays valid. The
      # host-side port is independently configurable via METRICS_HOST_PORT.
      - "${METRICS_HOST_PORT:-9090}:9090"
    healthcheck:
      # Mirrors the Dockerfile HEALTHCHECK so compose-level wait + watch
      # commands work without depending on the image build (Epic 13 T11).
      # /health returns 503 when chain DB is down or mainLoop is dead;
      # 200 for ok/dormant/degraded (operator reads body for nuance).
      test: ["CMD", "curl", "-fsS", "http://localhost:${RPC_PORT:-53550}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    logging: *default-logging
    networks:
      - demos-network

  # ---------------------------------------------------------------------------
  # Prometheus — metrics scraping. Reads ./monitoring/prometheus/prometheus.yml.
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: demos-prometheus${INSTANCE_SUFFIX:-}
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
      # NOTE — sub-path serving behind Caddy (Epic 12 T11):
      # The Caddyfile uses `handle_path /prometheus/*` which strips the
      # prefix before forwarding here, so Prom can stay at root with
      # no `--web.external-url` / `--web.route-prefix` flags. The
      # consequence is that UI asset links inside the Prometheus web
      # UI render absolute paths and assume root — when accessed via
      # `https://${PROXY_DOMAIN}/prometheus/` some links may need a
      # manual `/prometheus` prefix typed in. For full sub-path
      # support (alerts, federation, etc.) flip to a dedicated
      # `prometheus.${PROXY_DOMAIN}` subdomain in the Caddyfile. See
      # docs/runbooks/proxy-setup.md §"Prometheus sub-path caveats".
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - demos-network

  # ---------------------------------------------------------------------------
  # Grafana — dashboards. Provisioned datasource points at prometheus:9090.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.2
    container_name: demos-grafana${INSTANCE_SUFFIX:-}
    restart: unless-stopped
    profiles: [monitoring]
    # Wait until Prometheus reports healthy (Epic 13 T13). Previously a
    # plain short-form list which only waited for container-start, not
    # readiness — Grafana could initialize against an unreachable
    # datasource and need a manual restart.
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-demos}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      # Sub-path serving for `proxy` compose profile. Auto-enabled
      # whenever GRAFANA_ROOT_URL contains a non-root path. Default
      # (root URL) leaves serve-from-sub-path off — direct host-port
      # access at http://localhost:3000 keeps working as before.
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GRAFANA_SERVE_FROM_SUB_PATH:-false}
      GF_INSTALL_PLUGINS: grafana-clock-panel
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_BRANDING_APP_TITLE: Demos Network
      GF_BRANDING_LOGIN_TITLE: Demos Network
      GF_BRANDING_LOGIN_SUBTITLE: Node Monitoring
      GF_BRANDING_LOGIN_LOGO: /public/img/demos-logo.svg
      GF_BRANDING_MENU_LOGO: /public/img/demos-logo.svg
      GF_BRANDING_FAV_ICON: /public/img/favicon.png
      GF_BRANDING_HIDE_VERSION: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/demos-overview.json
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards,topnav,newPanelChromeUI
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_DATE_FORMATS_USE_BROWSER_LOCALE: "true"
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: browser
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./monitoring/grafana/branding/demos-logo-white.svg:/usr/share/grafana/public/img/demos-logo.svg:ro
      - ./monitoring/grafana/branding/demos-icon.svg:/usr/share/grafana/public/img/demos-icon.svg:ro
      - ./monitoring/grafana/branding/favicon.png:/usr/share/grafana/public/img/favicon.png:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    networks:
      - demos-network

  # ---------------------------------------------------------------------------
  # node-exporter — host-level metrics (CPU/RAM/disk/network). Optional.
  # Enable with: docker compose --profile monitoring --profile full up
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: demos-node-exporter${INSTANCE_SUFFIX:-}
    restart: unless-stopped
    profiles: [full]
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    networks:
      - demos-network

  # ---------------------------------------------------------------------------
  # Neo4j — only needed if CGC/KYC features are in use. Opt-in.
  # Enable with: docker compose --profile neo4j up
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.21
    container_name: demos-neo4j${INSTANCE_SUFFIX:-}
    restart: unless-stopped
    profiles: [neo4j]
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/changeme-please}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks:
      - demos-network

  # ---------------------------------------------------------------------------
  # Caddy — reverse proxy + automatic TLS (opt-in via `proxy` profile).
  # Fronts RPC / Signaling / MCP / Metrics / Grafana / Prometheus / TLSNotary
  # behind a single ${PROXY_DOMAIN}:443. OmniProtocol (53551) stays direct.
  #
  # Engage with:
  #   COMPOSE_PROFILES=monitoring,tlsnotary,proxy docker compose up -d
  # OR:
  #   docker compose --profile proxy up -d
  #
  # Required env (set in .env):
  #   PROXY_DOMAIN              public DNS, must point at this host
  #   ACME_EMAIL                Let's Encrypt contact
  #   METRICS_BASIC_AUTH_HASH   bcrypt — see Caddyfile comments
  #
  # See monitoring/caddy/Caddyfile + docs/runbooks/proxy-setup.md.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: demos-caddy${INSTANCE_SUFFIX:-}
    profiles: [proxy]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      PROXY_DOMAIN: ${PROXY_DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
      # Sentinel bcrypt that rejects every password. Operators override
      # in `.env` to enable basic-auth. Default lives here (not in
      # Caddyfile) because Caddy's `{$VAR:default}` fallback only fires
      # for UNSET vars — compose always sets the var, so the default
      # would never take effect. See Caddyfile.devnet line 46 for shape.
      METRICS_BASIC_AUTH_HASH: ${METRICS_BASIC_AUTH_HASH:-$$2a$$14$$invalidinvalidinvalidinvalidinvalidinvalidinvalidinvalidi}
      MCP_BASIC_AUTH_HASH: ${MCP_BASIC_AUTH_HASH:-$$2a$$14$$invalidinvalidinvalidinvalidinvalidinvalidinvalidinvalidi}
      # Epic 12 T14 — selects which tlsnotary-modes/*.caddy snippet
      # is imported. Allowed: subpath (default), subdomain, direct.
      TLSNOTARY_PROXY_MODE: ${TLSNOTARY_PROXY_MODE:-subpath}
      # The subpath snippet routes /tlsn/<notary-port>/ via {$TLSNOTARY_PORT},
      # which Caddy reads from its OWN env — so it must be set here, or the
      # notary leg falls back to 7047 and 502s on port-remapped stacks (devnet).
      TLSNOTARY_PORT: ${TLSNOTARY_PORT:-7047}
    volumes:
      - ./monitoring/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./monitoring/caddy/tlsnotary-modes:/etc/caddy/tlsnotary-modes:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      # Probe Caddy's local admin endpoint (loopback inside the
      # container — see `admin localhost:2019` in the Caddyfile global
      # block). The previous `http://localhost:80/` probe followed
      # Caddy's permanent redirect to https://localhost, which has no
      # matching cert (Caddy only holds one for $PROXY_DOMAIN) — so
      # the TLS handshake failed and the container stayed permanently
      # unhealthy in real deployments. The /config endpoint is always
      # 200 + JSON regardless of vhost state. Greptile P2.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - demos-network

networks:
  demos-network:
    name: demos-network${INSTANCE_SUFFIX:-}
    driver: bridge

volumes:
  # Explicit `name:` overrides Compose's project-name prefix so the volumes
  # have predictable identifiers that match what the docs reference.
  # Without this, `node_state` would actually be `<projectname>_node_state`,
  # silently breaking seeding commands like `docker run -v node_state:/state`.
  # ${INSTANCE_SUFFIX:-} expands to "" by default (names stay exactly as
  # documented); `./run --docker --port <p>` sets it to `_<p>` so each
  # instance owns a disjoint volume set.
  pgdata:
    name: demos_pgdata${INSTANCE_SUFFIX:-}
  node_data:
    name: demos_node_data${INSTANCE_SUFFIX:-}
  node_logs:
    name: demos_node_logs${INSTANCE_SUFFIX:-}
  node_state:
    name: demos_node_state${INSTANCE_SUFFIX:-}
  prometheus_data:
    name: demos_prometheus_data${INSTANCE_SUFFIX:-}
  grafana_data:
    name: demos_grafana_data${INSTANCE_SUFFIX:-}
  neo4j_data:
    name: demos_neo4j_data${INSTANCE_SUFFIX:-}
  neo4j_logs:
    name: demos_neo4j_logs${INSTANCE_SUFFIX:-}
  caddy_data:
    name: demos_caddy_data${INSTANCE_SUFFIX:-}
  caddy_config:
    name: demos_caddy_config${INSTANCE_SUFFIX:-}
