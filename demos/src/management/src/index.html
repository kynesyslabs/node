<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>DEMOS Node Interface</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="app.ts"></script>
</head>

<body>
  <h1>DEMOS Network Node Instance</h1>
  <br>
  <div class="centered">
    <div id="main" class="card">
      <div class="buttons">
        <button id="startServer">Node Start</button>
        <button id="stopServer">Stop</button>      
      </div>
      <!-- Main stats -->
      <br>
      <hr><br>
      <h2>Node Status</h2>
      <div class="centered">
        <img src="assets/blocks.gif" alt="blocks" width="100" height="100">
      </div><br>
      <div class="sameliner">
        <p class="inlined">Node Identity: </p>
        <p class="inlined" id="nodeIdentity">Not yet loaded</p>
      </div>
      <br>
      <div class="sameliner">
        <p class="inlined">Is Online: </p>
        <p class="inlined" id="nodeOnline">Not yet loaded</p>
      </div>
      <br>
      <div class="sameliner">
        <p class="inlined">Is Sync: </p>
        <p class="inlined" id="nodeSync">Not yet loaded</p>
      </div>
      <br>
      <div class="sameliner">
        <p class="inlined">Last error: </p>
        <p class="inlined" id="nodeSync">Not yet loaded</p>
      </div> <br>
      <div class="card centered">
        <p>Logs</p>
        <div class="card centered">
          <p class="logs" id="logs">
            Logs will appear here once a connection with the node is established.
          </p>
        </div>
      </div>


    </div>
  </div>
</body>

</html>
