  </div>

    <p class="oneliner">Connected to:</p>
    <div class="oneliner" id="rpcUrl">not connected yet</div>

    </div>
    <div class="animate__animated animate__fadeInLeft card oneliner translucid">
      <div class="title">
        Latest Blocks
      </div>
      <div class="blocks" id="latestBlocks">;
