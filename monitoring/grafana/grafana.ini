# REVIEW: Demos Network - Custom Grafana Configuration
# Modern glass-morphism inspired theming following minting_app design

##################### Server #####################
[server]
# Enable gzip compression
enable_gzip = true
# Serve static assets with long cache
static_root_path = public

##################### Dashboards #####################
[dashboards]
# Default home dashboard
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/json/demos-overview.json
# Minimum dashboard refresh interval
min_refresh_interval = 5s

##################### Users & Theme #####################
[users]
# Default theme for all users - dark for glass morphism effect
default_theme = dark
# Disable user creation via UI
allow_sign_up = false

##################### UI #####################
[ui]
# Use dark mode as default
default_theme = dark

##################### Auth #####################
[auth]
# Disable user sign up
disable_signup_form = true
# Hide login form elements we don't need
disable_login = false

[auth.anonymous]
# Disable anonymous access
enabled = false

##################### Security #####################
[security]
# Admin user will use default from env vars
admin_email = admin@demos.network
# Disable gravatar for cleaner look
disable_gravatar = true

##################### Unified Alerting #####################
[unified_alerting]
enabled = true

##################### Panels #####################
[panels]
# Enable custom HTML in text panels for DEMOS branding header
disable_sanitize_html = true

##################### Explore #####################
[explore]
enabled = true

##################### Live #####################
[live]
# Enable Grafana Live for real-time updates
allowed_origins = *

##################### Feature Toggles #####################
[feature_toggles]
# Enable modern features for better UX
enable = publicDashboards,topnav,newPanelChromeUI

##################### Log #####################
[log]
mode = console
level = info

##################### Date Formats #####################
[date_formats]
# Use cleaner date formats
default_timezone = browser
use_browser_locale = true

##################### Help #####################
[help]
# Hide version in help menu for cleaner look
enabled = false

##################### Profile #####################
[profile]
enabled = true

##################### Query History #####################
[query_history]
enabled = true

##################### News #####################
[news]
# Disable news panel for cleaner dashboard
news_feed_enabled = false

##################### Rendering #####################
[rendering]
# Better font rendering
concurrent_render_request_limit = 30
