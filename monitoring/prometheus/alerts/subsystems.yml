# Per-subsystem alerts. Generic SubsystemDown rule fires for any
# non-skipped subsystem that drops to up=0. Epic 13 T14.
groups:
  - name: demos-subsystems
    rules:
      - alert: SubsystemDown
        # Skipped = 4 in our enum. Match anything not skipped + not ready.
        expr: demos_subsystem_up == 0 and demos_boot_step_status != 4
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Subsystem {{ $labels.subsystem }} is down"
          description: "demos_subsystem_up{subsystem=\"{{ $labels.subsystem }}\"} has been 0 for >2m without being intentionally skipped. Check /health.subsystems for last_error."

      - alert: PortDriftDetected
        expr: abs(demos_port_drift) > 0
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Subsystem {{ $labels.subsystem }} drifted from requested port"
          description: "Subsystem bound to a different port than configured (drift = {{ $value }}). Reachability + firewall rules may need an update."
