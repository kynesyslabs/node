# REVIEW: Prometheus configuration for Demos Network node monitoring
#
# Scrape configuration for collecting metrics from:
# - Demos node metrics endpoint (port 9090)
# - Node Exporter (optional, port 9100)
# - Prometheus self-monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'demos-network'

# Alerting configuration (optional, for future use)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional, for future alerting rules)
# rule_files:
#   - "alerts/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # Demos Network Node metrics
  # The node exposes metrics on port 9090 at /metrics endpoint
  - job_name: 'demos-node'
    static_configs:
      - targets: ['host.docker.internal:9090']
        labels:
          instance: 'local-node'
          environment: 'development'
    metrics_path: /metrics
    scrape_interval: 5s  # More frequent for real-time monitoring
    scrape_timeout: 5s

  # Node Exporter for host-level metrics (optional)
  # Only scraped if node-exporter is running (--profile full)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'host'
    metrics_path: /metrics
    scrape_interval: 15s

